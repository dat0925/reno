<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENO.ai</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:#0c0c0c;
  font-family:'DM Sans','Hiragino Sans',sans-serif;
  color:#ede9e3;
  display:flex;flex-direction:column;height:100vh;
}
::placeholder{color:#444;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

/* ── Setup overlay ── */
#setup{
  position:fixed;inset:0;background:#0c0c0c;
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:24px;
}
.setup-card{
  width:100%;max-width:440px;
}
.setup-logo{
  font-family:'Cormorant Garamond',serif;font-size:28px;
  font-weight:600;letter-spacing:0.12em;margin-bottom:4px;
}
.setup-logo span{
  font-family:'DM Sans',sans-serif;font-size:10px;
  color:#7a6a50;letter-spacing:0.25em;text-transform:uppercase;
  border:1px solid #2a2a2a;padding:2px 7px;border-radius:3px;
  vertical-align:middle;margin-left:10px;
}
.setup-desc{color:#686868;font-size:13px;margin-bottom:32px;letter-spacing:0.02em;}
.setup-field{margin-bottom:16px;}
.setup-label{
  font-size:10px;color:#686868;letter-spacing:0.16em;
  text-transform:uppercase;display:block;margin-bottom:7px;
}
.setup-input{
  width:100%;background:#141414;border:1px solid #222;border-radius:6px;
  color:#ede9e3;font-size:13px;padding:11px 14px;outline:none;
  font-family:inherit;transition:border-color 0.2s;
}
.setup-input:focus{border-color:#8a6a3a;}
.setup-note{font-size:11px;color:#444;margin-top:5px;letter-spacing:0.02em;}
.setup-btn{
  width:100%;margin-top:24px;
  background:linear-gradient(135deg,#c8a96e,#9a7238);
  border:none;border-radius:8px;color:#0c0c0c;
  font-weight:500;font-size:13px;padding:14px;
  cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;
  font-family:inherit;transition:opacity 0.2s;
}
.setup-btn:hover{opacity:0.88;}
.setup-divider{
  height:1px;background:linear-gradient(to right,#1e1e1e,transparent);
  margin:28px 0;
}

/* ── Header ── */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid #161616;
  flex-shrink:0;
}
.header-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:600;letter-spacing:0.12em;
}
.header-badge{
  font-size:9px;color:#7a6a50;letter-spacing:0.2em;
  text-transform:uppercase;border:1px solid #2a2a2a;
  padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle;
}
.header-reset{
  background:none;border:1px solid #1e1e1e;border-radius:5px;
  color:#555;font-size:11px;padding:5px 10px;cursor:pointer;
  letter-spacing:0.04em;font-family:inherit;transition:color 0.15s;
}
.header-reset:hover{color:#888;}

/* ── Chat area ── */
#chat{
  flex:1;overflow-y:auto;padding:24px 20px;
  display:flex;flex-direction:column;gap:16px;
}
.msg{display:flex;gap:10px;max-width:100%;}
.msg.user{flex-direction:row-reverse;}
.avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  margin-top:2px;
}
.avatar.agent{background:#1a1714;border:1px solid #2a2520;color:#c8a96e;}
.avatar.user{background:#1a1a1a;border:1px solid #222;color:#888;}
.bubble{
  max-width:75%;padding:11px 15px;border-radius:10px;
  font-size:13.5px;line-height:1.65;letter-spacing:0.01em;
}
.bubble.agent{background:#141414;border:1px solid #1e1e1e;color:#d0cdc8;}
.bubble.user{background:#1a1714;border:1px solid #2a2218;color:#c8b890;}

/* image result in chat */
.bubble.agent img.gen-result{
  width:100%;border-radius:7px;display:block;margin-top:10px;max-height:260px;object-fit:cover;
}
.compare-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.compare-pair .ci{position:relative;}
.compare-pair img{width:100%;border-radius:6px;display:block;max-height:180px;object-fit:cover;}
.ci-tag{
  position:absolute;top:7px;left:7px;background:rgba(10,10,10,0.82);
  font-size:9px;padding:2px 7px;border-radius:3px;
  letter-spacing:0.12em;text-transform:uppercase;backdrop-filter:blur(4px);
}
.ci-tag.before{color:#b09060;}
.ci-tag.after{color:#7ab87a;}

/* upload card in chat */
.upload-card{
  margin-top:10px;border:1px dashed #2a2a2a;border-radius:8px;
  padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;
}
.upload-card:hover{border-color:#6a5030;background:rgba(200,169,110,0.03);}
.upload-card-icon{margin-bottom:6px;color:#444;}
.upload-card-text{font-size:12px;color:#666;letter-spacing:0.03em;}
.upload-card input{display:none;}

/* typing indicator */
.typing{display:flex;align-items:center;gap:4px;padding:4px 0;}
.typing span{
  width:5px;height:5px;background:#444;border-radius:50%;
  animation:bounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* ── Input bar ── */
#inputbar{
  padding:14px 16px;border-top:1px solid #161616;
  display:flex;gap:10px;align-items:flex-end;flex-shrink:0;
}
#userInput{
  flex:1;background:#111;border:1px solid #1e1e1e;border-radius:8px;
  color:#ede9e3;font-size:13px;padding:10px 14px;outline:none;
  resize:none;max-height:120px;overflow-y:auto;font-family:inherit;
  line-height:1.5;transition:border-color 0.2s;min-height:42px;
}
#userInput:focus{border-color:#3a2e1e;}
#sendBtn{
  background:linear-gradient(135deg,#c8a96e,#9a7238);
  border:none;border-radius:7px;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 0.15s;flex-shrink:0;
}
#sendBtn:hover{opacity:0.85;}
#sendBtn:disabled{opacity:0.3;cursor:not-allowed;}

/* ── Misc ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.msg{animation:fadeIn 0.3s ease;}
</style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <div class="setup-card">
    <div class="setup-logo">RENO.ai <span>AI Agent</span></div>
    <p class="setup-desc">リフォームの要望をチャットでヒアリングし、施工後のイメージを生成します。</p>
    <div class="setup-divider"></div>
    <div class="setup-field">
      <label class="setup-label">Anthropic API Key <span style="color:#554433;font-size:9px;">（会話AI）</span></label>
      <input type="password" id="keyAnthropic" class="setup-input" placeholder="sk-ant-...">
    </div>
    <div class="setup-field">
      <label class="setup-label">OpenAI API Key <span style="color:#554433;font-size:9px;">（画像生成）</span></label>
      <input type="password" id="keyOpenai" class="setup-input" placeholder="sk-proj-...">
    </div>
    <p class="setup-note">※ 入力したキーはブラウザ外に送信されません</p>
    <button class="setup-btn" onclick="startChat()">はじめる</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none;flex:1;flex-direction:column;height:100vh;overflow:hidden;display:none;">
  <div id="header">
    <div>
      <span class="header-logo">RENO.ai</span>
      <span class="header-badge">AI Agent</span>
    </div>
    <button class="header-reset" onclick="resetApp()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:middle;margin-right:4px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.1"/></svg>
      リセット
    </button>
  </div>
  <div id="chat"></div>
  <div id="inputbar">
    <textarea id="userInput" placeholder="メッセージを入力..." rows="1"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}">
    </textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#0c0c0c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `あなたはRENO.aiのAIリフォームコンサルタントです。
エンドユーザー（施主）とフレンドリーかつプロフェッショナルにチャットし、リフォームの要望をヒアリングして、施工後のビジュアルイメージ生成を提案します。

## 会話の流れ
1. 温かく挨拶し、どの部屋・スペースをリフォームしたいか聞く
2. 現状の状態と変えたい箇所を具体的に聞く（床・壁・キッチンなど）
3. 好みのスタイル（モダン・ナチュラル・和風・インダストリアルなど）を聞く
4. 十分な情報が集まったら「では実際のお部屋の写真で施工後イメージを生成しましょう！」と提案し、以下を出力する：
   [GENERATE_IMAGE: {英語の画像生成プロンプト}]

## プロンプトのルール
- 英語で記述する
- 変更箇所を明確に、それ以外は "Keep everything else exactly the same. Photorealistic interior design." で締める
- 例: "Change the floor to light oak hardwood planks. Keep all furniture, walls, and ceiling exactly the same. Photorealistic interior design."

## 重要なルール
- 常に日本語で返答する
- 返答は短く（3〜5文程度）
- 一度に聞く質問は1つまで
- [GENERATE_IMAGE:...] は必ず単体で1行に出力する
- 画像生成後は結果についてコメントし、別の箇所も試すか聞く
- 親しみやすく、専門的すぎない言葉を使う`;

let anthropicKey = '';
let openaiKey = '';
let history = [];
let waitingForImage = false;
let pendingPrompt = '';

function startChat() {
  anthropicKey = document.getElementById('keyAnthropic').value.trim();
  openaiKey = document.getElementById('keyOpenai').value.trim();
  if (!anthropicKey || !openaiKey) { alert('両方のAPIキーを入力してください'); return; }
  document.getElementById('setup').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  addAgentMessage('こんにちは！RENO.aiへようこそ🏠\nどのお部屋をリフォームしたいとお考えですか？（例：リビング、キッチン、浴室など）');
}

function resetApp() {
  history = [];
  waitingForImage = false;
  pendingPrompt = '';
  document.getElementById('chat').innerHTML = '';
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('keyAnthropic').value = '';
  document.getElementById('keyOpenai').value = '';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

function addAgentMessage(text, withImage = null, beforeSrc = null) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent';
  
  const iconSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`;
  
  let inner = `<div class="avatar agent">${iconSVG}</div><div class="bubble agent">`;
  inner += text.replace(/\n/g, '<br>');

  if (withImage && beforeSrc) {
    inner += `<div class="compare-pair">
      <div class="ci"><span class="ci-tag before">Before</span><img src="${beforeSrc}" alt="before"></div>
      <div class="ci"><span class="ci-tag after">After</span><img src="${withImage}" alt="after"></div>
    </div>`;
  }
  inner += '</div>';
  div.innerHTML = inner;
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function addUserMessage(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg user';
  const iconSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
  div.innerHTML = `<div class="avatar user">${iconSVG}</div><div class="bubble user">${text.replace(/\n/g,'<br>')}</div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function addTypingIndicator() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing-indicator';
  const iconSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`;
  div.innerHTML = `<div class="avatar agent">${iconSVG}</div><div class="bubble agent"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

function showUploadCard(prompt) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'upload-card-msg';
  const iconSVG = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>`;
  div.innerHTML = `<div class="avatar agent">${iconSVG}</div>
    <div class="bubble agent">
      <div class="upload-card" onclick="document.getElementById('photoInput').click()">
        <div class="upload-card-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div class="upload-card-text">現在のお部屋の写真をアップロード</div>
        <div class="upload-card-text" style="color:#444;font-size:11px;margin-top:3px;">タップして選択 / ドラッグ＆ドロップ</div>
      </div>
      <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(event,'${prompt.replace(/'/g,"\\'")}')">
    </div>`;
  chat.appendChild(div);
  scrollToBottom();
}

async function handlePhotoUpload(event, prompt) {
  const file = event.target.files[0];
  if (!file) return;
  const beforeURL = URL.createObjectURL(file);

  // remove upload card
  const card = document.getElementById('upload-card-msg');
  if (card) card.remove();

  addUserMessage('📷 写真をアップロードしました');
  addTypingIndicator();

  try {
    const formData = new FormData();
    formData.append('model', 'gpt-image-1');
    formData.append('image[]', file, file.name);
    formData.append('prompt', prompt);
    formData.append('n', '1');
    formData.append('size', '1024x1024');

    const res = await fetch('https://api.openai.com/v1/images/edits', {
      method: 'POST',
      headers: { Authorization: `Bearer ${openaiKey}` },
      body: formData,
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '生成に失敗しました');

    const imgData = data.data?.[0];
    let src = imgData?.url || (imgData?.b64_json ? `data:image/png;base64,${imgData.b64_json}` : null);
    if (!src) throw new Error('画像の取得に失敗しました');

    removeTypingIndicator();
    addAgentMessage('施工後のイメージが完成しました！いかがでしょうか？\n他の箇所も試してみますか？', src, beforeURL);

    history.push({
      role: 'assistant',
      content: '施工後のイメージが完成しました！いかがでしょうか？\n他の箇所も試してみますか？'
    });

  } catch(e) {
    removeTypingIndicator();
    addAgentMessage(`申し訳ありません、画像生成中にエラーが発生しました。\n${e.message}`);
  }

  waitingForImage = false;
  pendingPrompt = '';
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  if (document.getElementById('sendBtn').disabled) return;

  input.value = '';
  input.style.height = 'auto';
  addUserMessage(text);
  history.push({ role: 'user', content: text });

  document.getElementById('sendBtn').disabled = true;
  addTypingIndicator();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'APIエラーが発生しました');

    const raw = data.content?.[0]?.text || '';
    removeTypingIndicator();

    // Detect [GENERATE_IMAGE: prompt]
    const match = raw.match(/\[GENERATE_IMAGE:\s*([\s\S]+?)\]/);
    if (match) {
      const imagePrompt = match[1].trim();
      const displayText = raw.replace(/\[GENERATE_IMAGE:[\s\S]+?\]/, '').trim();
      if (displayText) addAgentMessage(displayText);
      history.push({ role: 'assistant', content: raw });
      showUploadCard(imagePrompt);
    } else {
      addAgentMessage(raw);
      history.push({ role: 'assistant', content: raw });
    }

  } catch(e) {
    removeTypingIndicator();
    addAgentMessage(`エラーが発生しました: ${e.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>
