<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENO.ai</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#0c0c0c;font-family:'DM Sans','Hiragino Sans',sans-serif;color:#ede9e3;display:flex;flex-direction:column;height:100vh;}
::placeholder{color:#444;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px;}

/* ── PIN Screen ── */
#pinScreen{
  position:fixed;inset:0;background:#0c0c0c;
  display:flex;align-items:center;justify-content:center;
  z-index:100;padding:24px;
}
.pin-card{width:100%;max-width:320px;text-align:center;}
.pin-logo{
  font-family:'Cormorant Garamond',serif;font-size:30px;
  font-weight:600;letter-spacing:0.14em;margin-bottom:4px;
}
.pin-logo-badge{
  display:inline-block;font-size:9px;color:#7a6a50;
  letter-spacing:0.22em;text-transform:uppercase;
  border:1px solid #2a2a2a;padding:2px 7px;border-radius:3px;
  margin-left:8px;vertical-align:middle;
}
.pin-divider{height:1px;background:linear-gradient(to right,transparent,#1e1e1e,transparent);margin:28px 0;}
.pin-label{font-size:11px;color:#686868;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:20px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin-bottom:28px;}
.pin-dot{
  width:44px;height:52px;background:#111;border:1px solid #222;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:300;color:#ede9e3;letter-spacing:0;
  transition:border-color 0.15s;
}
.pin-dot.filled{border-color:#6a5030;color:#c8a96e;}
.pin-dot.error{border-color:#5a2020;color:#c07070;animation:shake 0.3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}  }
.pin-numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.pin-key{
  background:#141414;border:1px solid #1e1e1e;border-radius:8px;
  padding:14px;font-size:18px;font-weight:300;color:#ede9e3;
  cursor:pointer;transition:all 0.12s;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.pin-key:hover{background:#1a1a1a;border-color:#2a2a2a;}
.pin-key:active{transform:scale(0.95);}
.pin-key.del{font-size:14px;color:#666;}
.pin-key.empty{pointer-events:none;background:transparent;border-color:transparent;}

/* ── Header ── */
#header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid #161616;flex-shrink:0;
}
.h-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.12em;}
.h-badge{font-size:9px;color:#7a6a50;letter-spacing:0.2em;text-transform:uppercase;border:1px solid #2a2a2a;padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle;}
.h-reset{background:none;border:1px solid #1e1e1e;border-radius:5px;color:#555;font-size:11px;padding:5px 10px;cursor:pointer;letter-spacing:0.04em;font-family:inherit;transition:color 0.15s;display:flex;align-items:center;gap:5px;}
.h-reset:hover{color:#888;}

/* ── Chat ── */
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;}
.msg{display:flex;gap:10px;animation:fadeIn 0.3s ease;}
.msg.user{flex-direction:row-reverse;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.avatar.agent{background:#1a1714;border:1px solid #2a2520;color:#c8a96e;}
.avatar.user{background:#1a1a1a;border:1px solid #222;color:#888;}
.bubble{max-width:78%;padding:11px 15px;border-radius:10px;font-size:13.5px;line-height:1.65;letter-spacing:0.01em;}
.bubble.agent{background:#141414;border:1px solid #1e1e1e;color:#d0cdc8;}
.bubble.user{background:#1a1714;border:1px solid #2a2218;color:#c8b890;}

/* compare */
.compare-pair{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.ci{position:relative;}
.ci img{width:100%;border-radius:6px;display:block;max-height:180px;object-fit:cover;}
.ci-tag{position:absolute;top:7px;left:7px;background:rgba(10,10,10,0.82);font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:0.12em;text-transform:uppercase;backdrop-filter:blur(4px);}
.ci-tag.before{color:#b09060;}
.ci-tag.after{color:#7ab87a;}

/* upload card */
.upload-card{margin-top:10px;border:1px dashed #2a2a2a;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;}
.upload-card:hover{border-color:#6a5030;background:rgba(200,169,110,0.03);}
.upload-card-text{font-size:12px;color:#666;margin-top:6px;letter-spacing:0.03em;}

/* typing */
.typing{display:flex;align-items:center;gap:4px;padding:2px 0;}
.typing span{width:5px;height:5px;background:#333;border-radius:50%;animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* ── Share bar ── */
.share-bar{
  display:flex;gap:7px;margin-top:10px;flex-wrap:wrap;
}
.share-btn{
  display:flex;align-items:center;gap:6px;
  border:none;border-radius:7px;padding:8px 14px;
  font-size:12px;font-family:inherit;cursor:pointer;
  letter-spacing:0.03em;transition:all 0.15s;font-weight:500;
}
.share-btn:active{transform:scale(0.97);}
.share-btn.line{background:#06c755;color:#fff;}
.share-btn.line:hover{background:#05b34d;}
.share-btn.copy{background:#1e1e1e;border:1px solid #2a2a2a;color:#c8a96e;}
.share-btn.copy:hover{border-color:#6a5030;}
.share-btn.dl{background:#1e1e1e;border:1px solid #2a2a2a;color:#888;}
.share-btn.dl:hover{color:#bbb;}

.share-btn.pdf{background:#1e1e1e;border:1px solid #2a2a2a;color:#a08060;}
.share-btn.pdf:hover{border-color:#6a5030;color:#c8a96e;}

/* ── Cases Admin Panel ── */
#casesPanel{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:300;display:none;justify-content:flex-end;
  backdrop-filter:blur(2px);
}
#casesPanel.open{display:flex;}
.cases-drawer{
  width:100%;max-width:400px;background:#0e0e0e;
  border-left:1px solid #1e1e1e;display:flex;
  flex-direction:column;height:100%;overflow:hidden;
  animation:slideIn 0.25s ease;
}
.cases-head{
  padding:14px 18px;border-bottom:1px solid #161616;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.cases-title{font-size:13px;color:#c8a96e;letter-spacing:0.08em;}
.cases-close{background:none;border:none;color:#555;cursor:pointer;font-size:18px;padding:0;transition:color 0.15s;}
.cases-close:hover{color:#aaa;}
.cases-tabs{display:flex;border-bottom:1px solid #161616;flex-shrink:0;}
.cases-tab{
  flex:1;padding:10px;font-size:12px;color:#555;cursor:pointer;
  font-family:inherit;background:none;border:none;
  border-bottom:2px solid transparent;transition:all 0.15s;letter-spacing:0.04em;
}
.cases-tab.active{color:#c8a96e;border-bottom-color:#c8a96e;}
.cases-body{flex:1;overflow-y:auto;padding:14px;}

/* Upload form */
.case-form-field{margin-bottom:12px;}
.case-form-label{font-size:10px;color:#686868;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:6px;}
.case-form-input{
  width:100%;background:#141414;border:1px solid #222;border-radius:6px;
  color:#ede9e3;font-size:13px;padding:9px 12px;outline:none;
  font-family:inherit;transition:border-color 0.2s;
}
.case-form-input:focus{border-color:#8a6a3a;}
.case-img-upload{
  border:1px dashed #2a2a2a;border-radius:8px;padding:20px;
  text-align:center;cursor:pointer;transition:all 0.2s;position:relative;
}
.case-img-upload:hover{border-color:#6a5030;}
.case-img-preview{width:100%;border-radius:6px;display:block;max-height:160px;object-fit:cover;}
.case-submit{
  width:100%;background:linear-gradient(135deg,#c8a96e,#9a7238);
  border:none;border-radius:7px;color:#0c0c0c;font-size:13px;font-weight:500;
  padding:11px;cursor:pointer;font-family:inherit;letter-spacing:0.06em;
  text-transform:uppercase;transition:opacity 0.15s;margin-top:4px;
}
.case-submit:hover{opacity:0.88;}
.case-submit:disabled{opacity:0.4;cursor:not-allowed;}

/* Case list */
.case-list-item{
  display:flex;gap:10px;background:#111;border:1px solid #1e1e1e;
  border-radius:8px;padding:10px;margin-bottom:8px;
  align-items:flex-start;
}
.case-list-img{
  width:70px;height:56px;border-radius:5px;object-fit:cover;
  flex-shrink:0;background:#0a0a0a;
}
.case-list-info{flex:1;min-width:0;}
.case-list-title{font-size:13px;color:#d0cdc8;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.case-list-tags{display:flex;flex-wrap:wrap;gap:3px;}
.case-list-tag{background:#1a1a1a;border:1px solid #222;border-radius:3px;padding:1px 6px;font-size:10px;color:#777;}
.case-list-del{
  background:none;border:none;color:#333;cursor:pointer;
  padding:4px;transition:color 0.15s;flex-shrink:0;
}
.case-list-del:hover{color:#c07070;}

/* Case cards in chat */
.case-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.case-chat-card{
  background:#1a1a1a;border:1px solid #222;border-radius:8px;overflow:hidden;
  cursor:pointer;transition:border-color 0.15s;
}
.case-chat-card:hover{border-color:#6a5030;}
.case-chat-img{width:100%;height:90px;object-fit:cover;display:block;background:#111;}
.case-chat-body{padding:7px 9px;}
.case-chat-title{font-size:12px;color:#d0cdc8;margin-bottom:3px;line-height:1.3;}
.case-chat-tag{font-size:10px;color:#7a6a50;}
.case-empty{font-size:12px;color:#555;text-align:center;padding:16px 0;}

/* ── History Panel ── */
#historyPanel{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:300;display:none;justify-content:flex-end;
  backdrop-filter:blur(2px);
}
#historyPanel.open{display:flex;}
.history-drawer{
  width:100%;max-width:360px;background:#0e0e0e;
  border-left:1px solid #1e1e1e;display:flex;
  flex-direction:column;animation:slideIn 0.25s ease;
  height:100%;overflow:hidden;
}
@keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
.history-head{
  padding:16px 18px;border-bottom:1px solid #161616;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.history-title{font-size:13px;color:#c8a96e;letter-spacing:0.08em;}
.history-close{
  background:none;border:none;color:#555;cursor:pointer;
  font-size:18px;padding:0;line-height:1;transition:color 0.15s;
}
.history-close:hover{color:#aaa;}
.history-list{flex:1;overflow-y:auto;padding:12px;}
.history-empty{
  text-align:center;padding:40px 20px;
  color:#3a3a3a;font-size:13px;line-height:1.8;
}
.session-card{
  background:#111;border:1px solid #1e1e1e;border-radius:10px;
  margin-bottom:10px;overflow:hidden;transition:border-color 0.15s;
}
.session-card:hover{border-color:#2a2a2a;}
.session-img{
  width:100%;height:120px;object-fit:cover;display:block;
  background:#0a0a0a;
}
.session-img-placeholder{
  width:100%;height:80px;background:#111;
  display:flex;align-items:center;justify-content:center;
  color:#2a2a2a;font-size:11px;letter-spacing:0.08em;
}
.session-body{padding:10px 12px;}
.session-date{font-size:10px;color:#444;letter-spacing:0.08em;margin-bottom:6px;}
.session-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.session-tag{
  background:#1a1a1a;border:1px solid #222;border-radius:4px;
  padding:2px 8px;font-size:11px;color:#888;
}
.session-summary{font-size:12px;color:#686868;line-height:1.5;}

/* ── PDF loading overlay ── */
#pdfOverlay{
  position:fixed;inset:0;background:rgba(12,12,12,0.88);
  display:none;align-items:center;justify-content:center;
  z-index:200;flex-direction:column;gap:16px;
}
#pdfOverlay .spinner{width:28px;height:28px;border:2px solid #333;border-top-color:#c8a96e;border-radius:50%;animation:spin 0.8s linear infinite;}
#pdfOverlay p{color:#686868;font-size:13px;letter-spacing:0.06em;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Cost Simulator card ── */
.sim-card{
  margin-top:10px;background:#111;border:1px solid #222;
  border-radius:10px;padding:14px;
}
.sim-title{
  font-size:11px;color:#7a6a50;letter-spacing:0.14em;
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.sim-section{margin-bottom:12px;}
.sim-label{font-size:11px;color:#686868;margin-bottom:6px;letter-spacing:0.04em;}
.sim-sizes{display:flex;gap:5px;flex-wrap:wrap;}
.sim-sz{
  background:#1a1a1a;border:1px solid #222;border-radius:5px;
  padding:5px 10px;font-size:12px;color:#888;cursor:pointer;
  font-family:inherit;transition:all 0.15s;
}
.sim-sz.active{border-color:#c8a96e;color:#c8a96e;background:#1a1710;}
.sim-items{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.sim-item{
  display:flex;align-items:center;gap:7px;
  background:#1a1a1a;border:1px solid #1e1e1e;
  border-radius:5px;padding:7px 10px;cursor:pointer;
  transition:all 0.15s;
}
.sim-item.active{border-color:#6a5030;background:#1a1710;}
.sim-item input{display:none;}
.sim-check{
  width:14px;height:14px;border:1px solid #333;border-radius:3px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.sim-item.active .sim-check{background:#c8a96e;border-color:#c8a96e;}
.sim-item-label{font-size:12px;color:#777;transition:color 0.15s;}
.sim-item.active .sim-item-label{color:#d0cdc8;}
.sim-grades{display:flex;gap:5px;}
.sim-grade{
  flex:1;background:#1a1a1a;border:1px solid #222;border-radius:5px;
  padding:7px 6px;font-size:11px;color:#666;cursor:pointer;
  font-family:inherit;text-align:center;transition:all 0.15s;
}
.sim-grade.active{border-color:#c8a96e;color:#c8a96e;background:#1a1710;}
.sim-result{
  background:#141410;border:1px solid #2a2418;border-radius:8px;
  padding:12px 14px;margin-top:4px;
}
.sim-result-label{font-size:10px;color:#7a6a50;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;}
.sim-result-price{font-size:22px;font-weight:300;color:#c8a96e;letter-spacing:0.02em;}
.sim-result-note{font-size:10px;color:#444;margin-top:4px;letter-spacing:0.02em;}
.sim-confirm{
  width:100%;margin-top:10px;background:linear-gradient(135deg,#c8a96e,#9a7238);
  border:none;border-radius:7px;color:#0c0c0c;font-size:12px;font-weight:500;
  padding:10px;cursor:pointer;font-family:inherit;letter-spacing:0.06em;
  text-transform:uppercase;transition:opacity 0.15s;
}
.sim-confirm:hover{opacity:0.88;}

/* ── Material Info Card ── */
.mat-card{
  margin-top:10px;background:#111;border:1px solid #222;
  border-radius:10px;overflow:hidden;
}
.mat-header{
  padding:12px 14px 10px;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:center;gap:10px;
}
.mat-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.mat-name{font-size:14px;color:#ede9e3;font-weight:500;letter-spacing:0.02em;}
.mat-category{font-size:10px;color:#686868;letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;}
.mat-ratings{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid #1a1a1a;}
.mat-rating{padding:10px 14px;border-right:1px solid #1a1a1a;}
.mat-rating:nth-child(even){border-right:none;}
.mat-rating-label{font-size:10px;color:#686868;letter-spacing:0.08em;margin-bottom:4px;}
.mat-stars{display:flex;gap:2px;}
.mat-star{width:10px;height:10px;border-radius:50%;}
.mat-star.on{background:#c8a96e;}
.mat-star.off{background:#222;}
.mat-body{padding:12px 14px;}
.mat-row{margin-bottom:10px;}
.mat-row-label{font-size:10px;color:#7a6a50;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;}
.mat-pros{display:flex;flex-direction:column;gap:3px;}
.mat-pro{font-size:12px;color:#7ab87a;display:flex;align-items:flex-start;gap:5px;line-height:1.5;}
.mat-con{font-size:12px;color:#c07070;display:flex;align-items:flex-start;gap:5px;line-height:1.5;}
.mat-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.mat-badge{
  background:#1a1a1a;border:1px solid #222;border-radius:5px;
  padding:4px 10px;font-size:11px;color:#888;letter-spacing:0.04em;
}
.mat-badge span{color:#c8a96e;}

/* ── Day / Night toggle ── */
.daynight-wrap{margin-top:10px;}
.daynight-tabs{
  display:flex;gap:0;border:1px solid #222;border-radius:7px;overflow:hidden;margin-bottom:8px;
}
.dn-tab{
  flex:1;padding:7px;font-size:12px;color:#666;cursor:pointer;
  font-family:inherit;background:#111;border:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.15s;letter-spacing:0.04em;
}
.dn-tab:first-child{border-right:1px solid #222;}
.dn-tab.active{background:#1a1710;color:#c8a96e;}
.dn-img-wrap{position:relative;border-radius:8px;overflow:hidden;}
.dn-img-wrap img{width:100%;display:block;border-radius:8px;max-height:260px;object-fit:cover;}
.dn-label{
  position:absolute;bottom:8px;right:8px;
  background:rgba(10,10,10,0.8);font-size:10px;
  padding:3px 8px;border-radius:4px;letter-spacing:0.1em;
  backdrop-filter:blur(4px);
}
.dn-generating{
  display:flex;align-items:center;justify-content:center;
  height:160px;background:#111;border-radius:8px;
  color:#444;font-size:12px;gap:10px;
}

.share-btn.night{background:#1e1e1e;border:1px solid #2a2a2a;color:#8090b0;}
.share-btn.night:hover{border-color:#4a5070;color:#a0b0d0;}

/* ── Suggestion chips ── */
.suggestions{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:4px 0 2px 38px;
  animation:fadeIn 0.3s ease;
}
.chip{
  background:#141414;border:1px solid #2a2520;
  border-radius:20px;padding:7px 14px;
  font-size:12.5px;color:#c8a96e;cursor:pointer;
  font-family:inherit;letter-spacing:0.02em;
  transition:all 0.15s;white-space:nowrap;
}
.chip:hover{background:#1f1c17;border-color:#6a5030;color:#e0c080;}
.chip:active{transform:scale(0.97);}

/* ── Input bar ── */
#inputbar{padding:12px 16px;border-top:1px solid #161616;display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
#userInput{
  flex:1;background:#111;border:1px solid #1e1e1e;border-radius:8px;
  color:#ede9e3;font-size:13px;padding:10px 14px;outline:none;
  resize:none;max-height:120px;font-family:inherit;line-height:1.5;
  transition:border-color 0.2s;min-height:42px;
}
#userInput:focus{border-color:#3a2e1e;}
#sendBtn{
  background:linear-gradient(135deg,#c8a96e,#9a7238);border:none;border-radius:7px;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 0.15s;flex-shrink:0;
}
#sendBtn:hover{opacity:0.85;}
#sendBtn:disabled{opacity:0.3;cursor:not-allowed;}

#app{display:none;flex:1;flex-direction:column;height:100vh;overflow:hidden;}
</style>
</head>
<body>

<!-- Cases Admin Panel -->
<div id="casesPanel" onclick="closeCasesOuter(event)">

let pinValue = '';

function pinKey(k) {
  if (pinValue.length >= 4) return;
  pinValue += k;

  if (pinValue.length === 4) setTimeout(checkPin, 120);
}

function pinDel() {
  pinValue = pinValue.slice(0, -1);
  renderDots();
}

function renderDots(error = false) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.textContent = pinValue.length > i ? '●' : '';
    d.className = 'pin-dot' + (pinValue.length > i ? ' filled' : '') + (error ? ' error' : '');
  }
}

function checkPin() {
  if (pinValue === CORRECT_PIN) {
    document.getElementById('pinScreen').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'flex';
    if (!chatStarted) initChat();
  } else {
    renderDots(true);
    setTimeout(() => { pinValue = ''; renderDots(); }, 600);
  }
}

function lockApp() {
  pinValue = '';
  renderDots();
  document.getElementById('pinScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function handlePhoto(event, prompt) {
  const file = event.target.files[0];
  if (!file) return;
  const beforeURL = URL.createObjectURL(file);

  const card = document.getElementById('upload-msg');
  if (card) card.remove();
  addUserMessage('📷 写真をアップロードしました');
  addTyping();

  try {
    const form = new FormData();
    form.append('pin', CORRECT_PIN);
    form.append('prompt', prompt);
    form.append('image', file, file.name);

    const res  = await fetch(EDGE_URL, { method:'POST', headers: EDGE_HEADERS, body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '生成に失敗しました');

    const img = data.data?.[0];
    const src = img?.url || (img?.b64_json ? `data:image/png;base64,${img.b64_json}` : null);
    if (!src) throw new Error('画像の取得に失敗しました');

    removeTyping();
    addAgentMessage(
      '施工後のイメージが完成しました！いかがでしょうか？✨',
      src, beforeURL,
      ['別の箇所も試す', 'スタイルを変えてみる', '昼/夜を見る', '概算を見る', '提案書を作成']
    );
    history.push({ role:'assistant', content:'施工後のイメージが完成しました。いかがでしょうか？他の箇所も試してみますか？' });
    autoSaveSession(src); // バックグラウンドで保存

  } catch(e) {
    removeTyping();
    addAgentMessage(`申し訳ありません、エラーが発生しました。\n${e.message}`);
  }
}

// ── Share functions ──
async function srcToBlob(src) {
  if (src.startsWith('data:')) {
    const res = await fetch(src);
    return await res.blob();
  }
  const res = await fetch(src);
  return await res.blob();
}

async function shareViaLine(src) {
  try {
    const blob = await srcToBlob(src);
    const file = new File([blob], 'reno-ai.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: 'RENO.ai リフォームイメージ',
        text: 'AIが生成したリフォーム後のイメージです✨',
        files: [file],
      });
    } else {
      // fallback: LINE URL scheme with text only
      const url = encodeURIComponent('AIが生成したリフォームイメージをRENO.aiで確認しました！');
      window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(location.href)}&text=${url}`, '_blank');
    }
  } catch(e) {
    if (e.name !== 'AbortError') alert('共有できませんでした: ' + e.message);
  }
}

async function shareNative(src) {
  try {
    const blob = await srcToBlob(src);
    const file = new File([blob], 'reno-ai.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        title: 'RENO.ai リフォームイメージ',
        text: 'AIが生成したリフォーム後のイメージです✨',
        files: [file],
      });
    } else {
      alert('お使いのブラウザでは共有できません。「保存」からダウンロードしてください。');
    }
  } catch(e) {
    if (e.name !== 'AbortError') alert('共有できませんでした: ' + e.message);
  }
}

        夜の照明で再生成しています
      </div>
    </div>`;
  chat.appendChild(card); scrollBottom();

  try {
    // Fetch the after image as a file
    const res0 = await fetch(afterSrc);
    const blob0 = await res0.blob();
    const file  = new File([blob0], 'after.png', { type: blob0.type });

    const nightPrompt = 'Same interior at night. Warm indoor lighting from lamps and ceiling lights, dark evening outside the windows, cozy ambiance. Keep all furniture, materials, colors, and layout exactly the same. Photorealistic.';

    const form = new FormData();
    form.append('pin', CORRECT_PIN);
    form.append('prompt', nightPrompt);
    form.append('image', file, 'after.png');

    const res  = await fetch(EDGE_URL, { method:'POST', headers: EDGE_HEADERS, body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '生成失敗');

    const img = data.data?.[0];
    const nightSrc = img?.url || (img?.b64_json ? `data:image/png;base64,${img.b64_json}` : null);
    if (!nightSrc) throw new Error('画像取得失敗');

    document.getElementById('dn-card')?.remove();

  } catch(e) {
    document.getElementById('dn-card')?.remove();
    addAgentMessage(`夜のイメージ生成に失敗しました。\n${e.message}`);
  } finally {
    btn.disabled = false;
    btn.style.opacity = '';
  }
}

// ── PDF Generation ──
async function generatePDF(afterSrc, beforeSrc) {
  const overlay = document.getElementById('pdfOverlay');
  overlay.style.display = 'flex';

  try {
    // 1. Ask Claude to summarize the conversation
    const summaryRes = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pin: CORRECT_PIN, type: 'chat',
        system: `会話履歴からリフォームの要望を抽出し、以下のJSON形式のみで返してください。前後の説明は不要です。
{
  "room": "部屋名",
  "parts": "変更箇所",
  "style": "希望スタイル",
  "budget": "予算",
  "notes": "その他の要望・メモ",
  "summary": "2〜3文の要望まとめ"
}`,
        messages: [
          ...history,
          { role: 'user', content: 'この会話の要望をJSONにまとめてください' }
        ]
      })
    });
    const summaryData = await summaryRes.json();
    const raw = summaryData.content?.[0]?.text || '{}';
    let info = {};
    try {
      const match = raw.match(/\{[\s\S]+\}/);
      info = match ? JSON.parse(match[0]) : {};
    } catch(e) { info = {}; }

    // 2. Load images as base64
    const toBase64 = async (src) => {
      if (src.startsWith('data:')) return src;
      const res = await fetch(src);
      const blob = await res.blob();
      return new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
    };
    const [afterB64, beforeB64] = await Promise.all([toBase64(afterSrc), toBase64(beforeSrc)]);

    // 3. Build PDF
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const pad = 18;

    // Background
    doc.setFillColor(12, 12, 12);
    doc.rect(0, 0, W, H, 'F');

    // Gold accent bar
    doc.setFillColor(200, 169, 110);
    doc.rect(0, 0, W, 1.5, 'F');

    // Logo
    doc.setTextColor(237, 233, 227);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.text('RENO.ai', pad, 22);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(122, 106, 80);
    doc.text('INTERIOR VISUALIZER', pad + 42, 19);

    // Date
    const today = new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
    doc.setFontSize(9);
    doc.setTextColor(100, 100, 100);
    doc.text(today, W - pad, 22, { align: 'right' });

    // Divider
    doc.setDrawColor(40, 40, 40);
    doc.setLineWidth(0.3);
    doc.line(pad, 27, W - pad, 27);

    // Title
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.setTextColor(237, 233, 227);
    doc.text('リフォーム提案書', pad, 38);

    // Info table
    const fields = [
      ['対象エリア', info.room || '—'],
      ['施工箇所',   info.parts || '—'],
      ['ご希望スタイル', info.style || '—'],
      ['ご予算',     info.budget || '—'],
    ];
    let y = 48;
    fields.forEach(([label, val]) => {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(100, 100, 100);
      doc.text(label, pad, y);
      doc.setFontSize(10);
      doc.setTextColor(200, 169, 110);
      doc.text(val, pad + 38, y);
      doc.setDrawColor(30, 30, 30);
      doc.setLineWidth(0.2);
      doc.line(pad, y + 3, W - pad, y + 3);
      y += 11;
    });

    // Summary
    if (info.summary) {
      y += 2;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(100, 100, 100);
      doc.text('ご要望メモ', pad, y);
      y += 5;
      doc.setFontSize(9);
      doc.setTextColor(180, 175, 168);
      const lines = doc.splitTextToSize(info.summary, W - pad * 2);
      doc.text(lines, pad, y);
      y += lines.length * 5 + 4;
    }

    // Images
    y += 4;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(122, 106, 80);
    doc.text('BEFORE / AFTER', pad, y);
    y += 5;

    const imgW = (W - pad * 2 - 6) / 2;
    const imgH = imgW * 0.7;

    // Labels
    doc.setFontSize(7);
    doc.setTextColor(176, 144, 96);
    doc.text('BEFORE', pad, y + 4);
    doc.setTextColor(122, 184, 122);
    doc.text('AFTER', pad + imgW + 6, y + 4);
    y += 6;

    try { doc.addImage(beforeB64, 'JPEG', pad, y, imgW, imgH, '', 'MEDIUM'); } catch(e) {}
    try { doc.addImage(afterB64, 'JPEG', pad + imgW + 6, y, imgW, imgH, '', 'MEDIUM'); } catch(e) {}
    y += imgH + 10;

    // Notes
    if (info.notes) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(100, 100, 100);
      doc.text('備考', pad, y);
      y += 5;
      doc.setFontSize(9);
      doc.setTextColor(150, 145, 138);
      const nlines = doc.splitTextToSize(info.notes, W - pad * 2);
      doc.text(nlines, pad, y);
    }

    // Footer
    doc.setFillColor(20, 20, 20);
    doc.rect(0, H - 14, W, 14, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(80, 80, 80);
    doc.text('本提案書はRENO.ai AIエージェントが生成したイメージです。実際の施工内容・費用は担当者にご確認ください。', pad, H - 6);

    doc.save(`RENO-ai-提案書-${Date.now()}.pdf`);

  } catch(e) {
    alert('PDF生成に失敗しました: ' + e.message);
  } finally {
    overlay.style.display = 'none';
  }
}

// ── Cost Simulator ──
const COST_DATA = {
  sizes: [
    { label:'〜6畳', m2: 10 },
    { label:'8畳',   m2: 13 },
    { label:'10畳',  m2: 16 },
    { label:'12畳〜',m2: 20 },
  ],
  items: [
    { key:'floor',   label:'床材',       base:[8,15],   unit:'m2' },
    { key:'wall',    label:'壁紙',       base:[1,2.5],  unit:'m2' },
    { key:'kitchen', label:'キッチン',   base:[60,180], unit:'flat' },
    { key:'bath',    label:'浴室',       base:[60,150], unit:'flat' },
    { key:'toilet',  label:'トイレ',     base:[15,50],  unit:'flat' },
    { key:'wash',    label:'洗面所',     base:[15,50],  unit:'flat' },
    { key:'light',   label:'照明',       base:[8,30],   unit:'flat' },
    { key:'storage', label:'収納',       base:[15,60],  unit:'flat' },
  ],
  grades: [
    { key:'eco',   label:'エコノミー', mult:0.75 },
    { key:'std',   label:'スタンダード', mult:1.0 },
    { key:'pre',   label:'プレミアム',   mult:1.5 },
  ],
};

let simState = { sizeIdx:1, items:new Set(['floor','wall']), gradeIdx:1 };

function calcCost() {
  const m2 = COST_DATA.sizes[simState.sizeIdx].m2;
  const mult = COST_DATA.grades[simState.gradeIdx].mult;
  let lo = 0, hi = 0;
  COST_DATA.items.forEach(item => {
    if (!simState.items.has(item.key)) return;
    if (item.unit === 'm2') { lo += item.base[0] * m2; hi += item.base[1] * m2; }
    else                    { lo += item.base[0] * 10000; hi += item.base[1] * 10000; }
  });
  lo = Math.round(lo * mult / 10000) * 10000;
  hi = Math.round(hi * mult / 10000) * 10000;
  return { lo, hi };
}

function fmtMoney(n) {
  if (n >= 1000000) return (n/10000).toFixed(0) + '万円';
  return (n/10000).toFixed(0) + '万円';
}

function updateSimResult() {
  const { lo, hi } = calcCost();
  const el = document.getElementById('sim-price');
  if (!el) return;
  if (lo === 0) { el.textContent = '項目を選択してください'; return; }
  el.textContent = `${fmtMoney(lo)} 〜 ${fmtMoney(hi)}`;
}

  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg agent'; div.id = 'sim-msg';

  const sizeBtns = COST_DATA.sizes.map((s,i) =>
    `<button class="sim-sz ${i===simState.sizeIdx?'active':''}" onclick="simSetSize(${i})">${s.label}</button>`
  ).join('');

  const itemBtns = COST_DATA.items.map(item =>
    `<div class="sim-item ${simState.items.has(item.key)?'active':''}" onclick="simToggleItem('${item.key}')">
      <div class="sim-check">
        ${simState.items.has(item.key)?'<svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="#0c0c0c" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>':''}
      </div>
      <span class="sim-item-label">${item.label}</span>

  ).join('');

  const gradeBtns = COST_DATA.grades.map((g,i) =>
    `<button class="sim-grade ${i===simState.gradeIdx?'active':''}" onclick="simSetGrade(${i})">${g.label}</button>`
  ).join('');

  const { lo, hi } = calcCost();

  div.innerHTML = `<div class="avatar agent">${agentIcon}</div>
    <div class="bubble agent">
      <div class="sim-card">
        <div class="sim-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          工事費 概算シミュレーター
        </div>
        <div class="sim-section">
          <div class="sim-label">お部屋の広さ</div>
          <div class="sim-sizes">${sizeBtns}</div>
        </div>
        <div class="sim-section">
          <div class="sim-label">施工箇所（複数選択可）</div>
          <div class="sim-items">${itemBtns}</div>
        </div>
        <div class="sim-section">
          <div class="sim-label">グレード</div>
          <div class="sim-grades">${gradeBtns}</div>
        </div>
        <div class="sim-result">
          <div class="sim-result-label">概算費用</div>
          <div class="sim-result-price" id="sim-price">${lo?fmtMoney(lo)+' 〜 '+fmtMoney(hi):'項目を選択してください'}</div>
          <div class="sim-result-note">※ 相場の目安です。実際の費用は現地調査にてご確認ください。</div>
        </div>
        <button class="sim-confirm" onclick="simConfirm()">この内容で担当者に相談する</button>
      </div>
    </div>`;
  chat.appendChild(div);
  scrollBottom();
}

function simSetSize(i) {
  simState.sizeIdx = i;
  refreshSim();
}
function simToggleItem(key) {
  if (simState.items.has(key)) simState.items.delete(key);
  else simState.items.add(key);
  refreshSim();
}
function simSetGrade(i) {
  simState.gradeIdx = i;
  refreshSim();
}
function refreshSim() {
  const old = document.getElementById('sim-msg');
  if (!old) return;
  old.remove();
  showSimulator();
}
function simConfirm() {
  const { lo, hi } = calcCost();
  const size = COST_DATA.sizes[simState.sizeIdx].label;
  const items = [...simState.items].map(k => COST_DATA.items.find(i=>i.key===k)?.label).join('・');
  const grade = COST_DATA.grades[simState.gradeIdx].label;
  const text = `概算シミュレーション結果：${size}・${items}・${grade}グレードで${fmtMoney(lo)}〜${fmtMoney(hi)}程度です。この内容で進めたいと思います。`;
  document.getElementById('sim-msg')?.remove();
  addUserMessage(text);
  history.push({ role:'user', content: text });
  callAgent();
}

// ── Cases Panel ──
let casesTab = 'upload';
let caseImgData = '';

function openCasesPanel() {
  document.getElementById('casesPanel').classList.add('open');
  renderCasesTab();
}
function closeCasesPanel() {
  document.getElementById('casesPanel').classList.remove('open');
}
function closeCasesOuter(e) {
  if (e.target === document.getElementById('casesPanel')) closeCasesPanel();
}
function switchCasesTab(tab) {
  casesTab = tab;
  document.getElementById('tab-upload').classList.toggle('active', tab==='upload');
  document.getElementById('tab-list').classList.toggle('active', tab==='list');
  renderCasesTab();
}

function renderCasesTab() {
  if (casesTab === 'upload') renderUploadForm();
  else renderCasesList();
}

function renderUploadForm() {
  document.getElementById('casesBody').innerHTML = `
    <div class="case-form-field">
      <label class="case-form-label">タイトル</label>
      <input type="text" id="cf-title" class="case-form-input" placeholder="例：リビング フルリノベーション">
    </div>
    <div class="case-form-field">
      <label class="case-form-label">部屋</label>
      <input type="text" id="cf-room" class="case-form-input" placeholder="例：リビング、キッチン、浴室">
    </div>
    <div class="case-form-field">
      <label class="case-form-label">スタイル</label>
      <input type="text" id="cf-style" class="case-form-input" placeholder="例：モダン、ナチュラル、和風">
    </div>
    <div class="case-form-field">
      <label class="case-form-label">予算帯</label>
      <input type="text" id="cf-budget" class="case-form-input" placeholder="例：100〜150万円">
    </div>
    <div class="case-form-field">
      <label class="case-form-label">施工のポイント</label>
      <input type="text" id="cf-desc" class="case-form-input" placeholder="例：天井高を活かした開放的な空間に">
    </div>
    <div class="case-form-field">
      <label class="case-form-label">施工写真</label>
      <div class="case-img-upload" id="caseImgZone" onclick="document.getElementById('caseImgInput').click()">
        <div id="caseImgPreviewWrap">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <div style="font-size:12px;color:#555;margin-top:6px;">タップして写真を選択</div>
        </div>
        <input type="file" id="caseImgInput" accept="image/*" style="display:none" onchange="previewCaseImg(event)">
      </div>
    </div>
    <button class="case-submit" id="caseSubmitBtn" onclick="submitCase()">事例を登録する</button>
    <div id="caseMsg" style="font-size:12px;color:#7ab87a;text-align:center;margin-top:8px;display:none;">✓ 登録しました！</div>
  `;
}

function previewCaseImg(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    caseImgData = ev.target.result;
    document.getElementById('caseImgPreviewWrap').innerHTML =
      `<img class="case-img-preview" src="${caseImgData}" alt="preview">`;
  };
  reader.readAsDataURL(file);
}

async function submitCase() {
  const title  = document.getElementById('cf-title').value.trim();
  const room   = document.getElementById('cf-room').value.trim();
  const style  = document.getElementById('cf-style').value.trim();
  const budget = document.getElementById('cf-budget').value.trim();
  const desc   = document.getElementById('cf-desc').value.trim();
  if (!title || !room) { alert('タイトルと部屋名は必須です'); return; }

  const btn = document.getElementById('caseSubmitBtn');
  btn.disabled = true; btn.textContent = '登録中...';

  try {
    await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pin: CORRECT_PIN, type: 'save_case',
        title, room, style, budget_range: budget,
        description: desc, image_data: caseImgData,
      })
    });
    const msg = document.getElementById('caseMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 2000);
    // Reset form
    caseImgData = '';
    renderUploadForm();
  } catch(e) {
    alert('登録に失敗しました: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

async function renderCasesList() {
  document.getElementById('casesBody').innerHTML = '<div style="color:#555;font-size:13px;text-align:center;padding:20px;">読み込み中...</div>';
  try {
    const res  = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: CORRECT_PIN, type: 'get_cases', room:'', style:'' })
    });
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      document.getElementById('casesBody').innerHTML = '<div style="color:#444;font-size:13px;text-align:center;padding:30px;">まだ事例がありません</div>';
      return;
    }
    document.getElementById('casesBody').innerHTML = data.map(c => `
      <div class="case-list-item">
        ${c.image_data ? `<img class="case-list-img" src="${c.image_data}" alt="">` : `<div class="case-list-img" style="display:flex;align-items:center;justify-content:center;color:#2a2a2a;font-size:10px;">NO IMG</div>`}
        <div class="case-list-info">
          <div class="case-list-title">${c.title || '—'}</div>
          <div class="case-list-tags">
            ${c.room   ? `<span class="case-list-tag">${c.room}</span>` : ''}
            ${c.style  ? `<span class="case-list-tag">${c.style}</span>` : ''}
            ${c.budget_range ? `<span class="case-list-tag">${c.budget_range}</span>` : ''}
          </div>
        </div>
        <button class="case-list-del" onclick="deleteCase('${c.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>`).join('');
  } catch(e) {
    document.getElementById('casesBody').innerHTML = `<div style="color:#c07070;font-size:12px;text-align:center;padding:20px;">${e.message}</div>`;
  }
}

async function deleteCase(id) {
  if (!confirm('この事例を削除しますか？')) return;
  await fetch(EDGE_URL, {
    method: 'POST',
    headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin: CORRECT_PIN, type: 'delete_case', id })
  });
  renderCasesList();
}

// ── Show Cases in chat ──
async function showCases(room, style) {
  const chat = document.getElementById('chat');
  const loading = document.createElement('div');
  loading.className = 'msg agent'; loading.id = 'cases-loading';
  loading.innerHTML = `<div class="avatar agent">${agentIcon}</div>
    <div class="bubble agent"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(loading); scrollBottom();

  try {
    const res  = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: CORRECT_PIN, type: 'get_cases', room, style })
    });
    const data = await res.json();
    document.getElementById('cases-loading')?.remove();

    const div = document.createElement('div');
    div.className = 'msg agent';

    if (!Array.isArray(data) || data.length === 0) {
      div.innerHTML = `<div class="avatar agent">${agentIcon}</div>
        <div class="bubble agent">まだ施工事例が登録されていません。<br>担当者に直接お問い合わせください。</div>`;
    } else {
      const cards = data.map(c => `
        <div class="case-chat-card">
          ${c.image_data ? `<img class="case-chat-img" src="${c.image_data}" alt="">` : `<div class="case-chat-img" style="display:flex;align-items:center;justify-content:center;color:#333;font-size:10px;">NO IMAGE</div>`}
          <div class="case-chat-body">
            <div class="case-chat-title">${c.title || '施工事例'}</div>
            <div class="case-chat-tag">${[c.room, c.style, c.budget_range].filter(Boolean).join(' · ')}</div>
          </div>
        </div>`).join('');

      div.innerHTML = `<div class="avatar agent">${agentIcon}</div>
        <div class="bubble agent">
          ${room || style ? `${[room,style].filter(Boolean).join('・')}の施工事例です。` : '施工事例の一覧です。'}参考にしてみてください！
          <div class="case-cards">${cards}</div>
        </div>`;
    }
    chat.appendChild(div);
    renderSuggestions(['画像で確認する', '概算を見る', 'このスタイルで進めたい', '提案書を作成']);
    scrollBottom();
  } catch(e) {
    document.getElementById('cases-loading')?.remove();
    addAgentMessage(`事例の取得に失敗しました: ${e.message}`);
  }
}

// ── Session History ──
async function autoSaveSession(afterSrc) {
  try {
    // Extract structured info from conversation
    const res = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pin: CORRECT_PIN, type: 'chat',
        system: `会話履歴からリフォームの要望を抽出し、以下のJSON形式のみで返してください。
{"room":"部屋名","parts":"変更箇所","style":"希望スタイル","budget":"予算","summary":"1〜2文の要約"}`,
        messages: [...history, { role:'user', content: '要望をJSONにまとめてください' }]
      })
    });
    const data = await res.json();
    const raw  = data.content?.[0]?.text || '{}';
    let info = {};
    try { const m = raw.match(/\{[\s\S]+\}/); info = m ? JSON.parse(m[0]) : {}; } catch(e) {}

    // Store image URL (data URL → truncate for storage efficiency)
    const imgToStore = afterSrc.startsWith('data:')
      ? afterSrc.substring(0, 8000)  // thumbnail-ish
      : afterSrc;

    await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pin: CORRECT_PIN, type: 'save_session',
        room: info.room || '—',
        parts: info.parts || '—',
        style: info.style || '—',
        budget: info.budget || '—',
        summary: info.summary || '',
        after_image_url: imgToStore,
      })
    });
  } catch(e) {
    console.warn('Session save failed:', e.message);
  }
}

async function openHistoryPanel() {
  document.getElementById('historyPanel').classList.add('open');
  const list = document.getElementById('historyList');
  list.innerHTML = '<div class="history-empty">読み込み中...</div>';

  try {
    const res  = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: CORRECT_PIN, type: 'get_sessions' })
    });
    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div class="history-empty">まだ履歴がありません。<br>ヒアリングを完了すると<br>ここに保存されます。</div>';
      return;
    }

    list.innerHTML = data.map(s => {
      const date = new Date(s.created_at).toLocaleDateString('ja-JP', {
        month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
      });
      const imgHtml = s.after_image_url
        ? `<img class="session-img" src="${s.after_image_url}" alt="after">`
        : `<div class="session-img-placeholder">NO IMAGE</div>`;
      return `<div class="session-card">
        ${imgHtml}
        <div class="session-body">
          <div class="session-date">${date}</div>
          <div class="session-tags">
            ${s.room  ? `<span class="session-tag">${s.room}</span>` : ''}
            ${s.parts ? `<span class="session-tag">${s.parts}</span>` : ''}
            ${s.style ? `<span class="session-tag">${s.style}</span>` : ''}
            ${s.budget? `<span class="session-tag">${s.budget}</span>` : ''}
          </div>
          ${s.summary ? `<div class="session-summary">${s.summary}</div>` : ''}
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    list.innerHTML = `<div class="history-empty">読み込みに失敗しました。<br>${e.message}</div>`;
  }
}

function closeHistoryPanel() {
  document.getElementById('historyPanel').classList.remove('open');
}

function closeHistory(e) {
  if (e.target === document.getElementById('historyPanel')) closeHistoryPanel();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text || document.getElementById('sendBtn').disabled) return;
  input.value = ''; input.style.height = 'auto';
  removeSuggestions();
  addUserMessage(text);
  history.push({ role:'user', content: text });
  await callAgent();
  document.getElementById('userInput').focus();
}

async function callAgent() {
  document.getElementById('sendBtn').disabled = true;
  addTyping();
  try {
    const res  = await fetch(EDGE_URL, {
      method: 'POST',
      headers: { ...EDGE_HEADERS, 'Content-Type':'application/json' },
      body: JSON.stringify({ pin: CORRECT_PIN, type:'chat', system: SYSTEM_PROMPT, messages: history }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || 'APIエラー');

    const raw = data.content?.[0]?.text || '';
    removeTyping();

    // Parse tags
    const genMatch  = raw.match(/\[GENERATE_IMAGE:\s*([\s\S]+?)\]/);
    const simMatch  = raw.match(/\[SHOW_SIMULATOR\]/);
    const matMatch  = raw.match(/\[SHOW_MATERIAL:\s*(\w+)\]/);
    const casesMatch = raw.match(/\[SHOW_CASES:\s*([^,\]]*),?\s*([^\]]*)\]/);
    const sugMatch  = raw.match(/\[SUGGESTIONS:\s*(.+?)\]/);
    const suggestions = sugMatch
      ? sugMatch[1].split(',').map(s => s.trim()).filter(Boolean)
      : null;

    let display = raw
      .replace(/\[GENERATE_IMAGE:[\s\S]+?\]/, '')
      .replace(/\[SHOW_SIMULATOR\]/, '')
      .replace(/\[SHOW_MATERIAL:\s*\w+\]/, '')
      .replace(/\[SHOW_CASES:[^\]]*\]/, '')
      .replace(/\[SUGGESTIONS:.+?\]/, '')
      .trim();

    if (genMatch) {
      if (display) addAgentMessage(display);
      history.push({ role:'assistant', content: raw });
      showUploadCard(genMatch[1].trim());
    } else if (simMatch) {
      if (display) addAgentMessage(display);
      history.push({ role:'assistant', content: raw });
      showSimulator();
    } else if (matMatch) {
      if (display) addAgentMessage(display);
      history.push({ role:'assistant', content: raw });
      showMaterial(matMatch[1].trim());
    } else if (casesMatch) {
      if (display) addAgentMessage(display);
      history.push({ role:'assistant', content: raw });
      showCases(casesMatch[1].trim(), casesMatch[2].trim());
    } else {
      addAgentMessage(display, null, null, suggestions);
      history.push({ role:'assistant', content: raw });
    }

  } catch(e) {
    removeTyping();
    addAgentMessage(`エラーが発生しました: ${e.message}`);
  }
  document.getElementById('sendBtn').disabled = false;
}
